{% extends 'base.html' %}

{% block title %}Cadastro — SAD Central{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card auth-card">
        <h2 class="auth-title"><i class="fa-solid fa-user-plus text-purple"></i> Criar Conta</h2>
        <p class="auth-subtitle">Registre-se gratuitamente para começar a mapear decisões multicritério.</p>
        
        <form action="{{ url_for('register') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Nome de Usuário</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" required placeholder="Escolha um usuário exclusivo">
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Endereço de E-mail</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Senha de Acesso</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="password" name="password" required placeholder="Crie uma senha segura">
                </div>
            </div>
            
            <button type="submit" class="btn btn-purple btn-block btn-lg"><i class="fa-solid fa-user-check"></i> Finalizar Cadastro</button>
        </form>
        
        <div class="auth-footer">
            <span>Já possui conta? <a href="{{ url_for('login') }}" class="text-link">Faça Login</a></span>
        </div>
    </div>
</div>
{% endblock %}
