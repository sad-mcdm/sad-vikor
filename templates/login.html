{% extends 'base.html' %}

{% block title %}Login — SAD Central{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card auth-card">
        <h2 class="auth-title"><i class="fa-solid fa-lock text-teal"></i> Identificação</h2>
        <p class="auth-subtitle">Entre com suas credenciais para gerenciar seus problemas multicritério.</p>
        
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Nome de Usuário</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" required placeholder="Digite seu usuário">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="password" name="password" required placeholder="Digite sua senha">
                </div>
            </div>
            
            <button type="submit" class="btn btn-teal btn-block btn-lg"><i class="fa-solid fa-sign-in-alt"></i> Acessar Sistema</button>
        </form>
        
        <div class="auth-footer">
            <span>Não tem conta? <a href="{{ url_for('register') }}" class="text-link">Cadastre-se</a></span>
        </div>
    </div>
</div>
{% endblock %}
